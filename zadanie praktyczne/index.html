<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Order summary card</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@500;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <div class="card">
      <img src="./images/illustration-hero.svg" alt="Music illustration" class="hero">

      <div class="content">
        <h1>Order Summary</h1>
        
        <p class="description">
          You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!
        </p>

        <div class="plan">
          <img src="./images/icon-music.svg" alt="Music icon" class="plan-icon">
          
          <div class="plan-info">
            <h3>Annual Plan</h3>
            <p>$59.99/year</p>
          </div>
          
          <a href="#" class="change-link">Change</a>
        </div>

        <button class="proceed-btn">Proceed to Payment</button>
        <button class="cancel-btn">Cancel Order</button>
      </div>
    </div>
  </main>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Adrian</a>.
  </div>

</body>
</html>
